    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; -webkit-font-smoothing: antialiased; }
      body { background: #FAF5EC; color: #0F0800; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #FAF5EC; }
      ::-webkit-scrollbar-thumb { background: #0F0800; border-radius: 0; }
      button { font-family: inherit; }
      select, textarea, input { font-family: inherit; outline: none; }
      a { color: inherit; text-decoration: none; }

      /* Marquee animation */
      @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
      .marquee-track { display: flex; animation: marquee 18s linear infinite; white-space: nowrap; will-change: transform; }
      .marquee-track:hover { animation-play-state: paused; }

      /* Fade in */
      @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
      .fade-up { animation: fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) both; }
    </style>
